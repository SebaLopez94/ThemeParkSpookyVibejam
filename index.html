<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Build a spooky haunted theme park — a retro 3D tycoon with rides, research, challenges and visitor simulation." />
    <meta name="theme-color" content="#0e0a1e" />

    <!-- Mobile web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Park Vibes" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="Theme Park Vibes" />
    <meta property="og:description" content="Build a spooky haunted theme park — retro 3D tycoon game." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/models/logo.png" />

    <title>Theme Park Vibes</title>
    <link rel="icon" type="image/x-icon" href="/models/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script async src="https://vibej.am/2026/widget.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Reposition the Vibe Jam widget: top-right on mobile, left on desktop
      new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
          m.addedNodes.forEach(function(node) {
            if (!(node instanceof HTMLElement)) return;
            if (getComputedStyle(node).position !== 'fixed') return;
            var mobile = window.innerWidth <= 640;
            var s = node.style;
            s.zIndex = '50';
            if (mobile) {
              s.bottom = 'calc(136px + env(safe-area-inset-bottom, 0px))';
              s.top = 'auto';
              s.right = '12px';
              s.left = 'auto';
            } else {
              s.bottom = '16px';
              s.top = 'auto';
              s.left = '16px';
              s.right = 'auto';
            }
          });
        });
      }).observe(document.body, { childList: true, subtree: false });
    </script>
  </body>
</html>
